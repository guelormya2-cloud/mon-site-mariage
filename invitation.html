<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation - Equinoxe Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .invitation-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .photo-section {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
        }
        
        .content-section {
            padding: 30px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #D4AF37;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .special-message {
            font-size: 1.2em;
            color: #666;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #D4AF37;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .info-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-item i {
            font-size: 2rem;
            color: #D4AF37;
            margin-bottom: 10px;
        }
        
        .btn-download {
            background: #D4AF37;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-download:hover {
            background: #B8860B;
            transform: translateY(-2px);
        }
        
        .btn-download i {
            margin-right: 10px;
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .contact-info a {
            color: #D4AF37;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .photo-section {
                height: 250px;
            }
            .header h1 {
                font-size: 2em;
            }
            .content-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <div id="loading" style="text-align: center; color: white; padding: 50px;">
            <div class="spinner-border" role="status"></div>
            <p class="mt-3">Chargement de votre invitation...</p>
        </div>
        
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        // Récupérer l'ID du lien depuis l'URL
        const pathParts = window.location.pathname.split('/');
        const lienId = pathParts[pathParts.length - 1].split('?')[0];
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        
        if (!dataStr) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="content-section text-center py-5">
                        <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                        <h3>Invitation non trouvée</h3>
                        <p>Le lien que vous avez utilisé n'est pas valide.</p>
                    </div>
                </div>
            `;
            document.getElementById('content').style.display = 'block';
        } else {
            try {
                const data = JSON.parse(atob(decodeURIComponent(dataStr)));
                
                document.getElementById('loading').style.display = 'none';
                
                document.getElementById('content').innerHTML = `
                    <div class="card">
                        <div class="photo-section" style="background-image: url('${data.evenementPhoto}')"></div>
                        
                        <div class="content-section">
                            <div class="header">
                                <h1>${data.evenementNom}</h1>
                            </div>
                            
                            <div class="special-message">
                                <i class="fas fa-star text-gold me-2"></i>
                                ${data.nom}, vous êtes notre invité(e) spécial(e)
                            </div>
                            
                            ${data.evenementMessage ? `
                                <div class="alert alert-info">
                                    <i class="fas fa-quote-left me-2"></i>
                                    ${data.evenementMessage}
                                </div>
                            ` : ''}
                            
                            <div class="info-grid">
                                <div class="info-item">
                                    <i class="fas fa-calendar"></i>
                                    <h4>Date</h4>
                                    <p>${data.evenementDate}</p>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-clock"></i>
                                    <h4>Heure</h4>
                                    <p>${data.evenementHeure}</p>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-map-marker"></i>
                                    <h4>Lieu</h4>
                                    <p>${data.evenementLieu}</p>
                                    <small>${data.evenementAdresse}</small>
                                </div>
                            </div>
                            
                            <button class="btn-download" onclick="telechargerInvitation()">
                                <i class="fas fa-download"></i>
                                Télécharger mon invitation
                            </button>
                            
                            <div class="contact-info">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h5><i class="fas fa-phone-alt me-2"></i>Contact</h5>
                                        <p><a href="tel:${data.evenementTelephone}">${data.evenementTelephone}</a></p>
                                    </div>
                                    <div class="col-md-6">
                                        <h5><i class="fas fa-envelope me-2"></i>Email</h5>
                                        <p><a href="mailto:${data.evenementEmail}">${data.evenementEmail}</a></p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-center mt-3 text-muted small">
                                Lien: ${window.location.href}
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
                
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = `
                    <div class="card">
                        <div class="content-section text-center py-5">
                            <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                            <h3>Erreur de chargement</h3>
                            <p>Impossible de charger l'invitation.</p>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
            }
        }
        
        function telechargerInvitation() {
            // Créer une version PDF ou image de l'invitation
            const element = document.querySelector('.card');
            const nom = document.querySelector('.special-message').textContent.split(',')[0];
            
            alert('Fonctionnalité de téléchargement à venir. Pour l\'instant, vous pouvez prendre une capture d\'écran.');
        }
    </script>
</body>
</html>
