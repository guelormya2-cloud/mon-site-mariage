<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation - Mariage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f5f0;
        }
        
        .invitation-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        
        .invitation-header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .invitation-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .couple-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            margin: -75px auto 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 10;
        }
        
        .info-section {
            padding: 20px;
        }
        
        .info-item {
            text-align: center;
            padding: 15px;
            background: #f8f5f0;
            border-radius: 10px;
            height: 100%;
        }
        
        .info-item i {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .boisson-option {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .boisson-option.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.05);
        }
        
        .btn-gold {
            background-color: var(--gold);
            border-color: var(--gold);
            color: white;
            padding: 12px 20px;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn-gold:hover {
            background-color: var(--dark-gold);
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .contact-info a {
            color: var(--gold);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .invitation-header h1 {
                font-size: 1.5rem;
            }
            
            .couple-photo {
                width: 120px;
                height: 120px;
                margin-top: -60px;
            }
            
            .info-item {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container py-3">
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-gold"></div>
            <p class="mt-3">Chargement...</p>
        </div>
        
        <div id="error" class="text-center py-5" style="display: none;">
            <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
            <h3>Invitation non trouvée</h3>
        </div>
        
        <div id="content" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const inviteId = urlParams.get('id');
        
        let invites = JSON.parse(localStorage.getItem('invites')) || [];
        let tables = JSON.parse(localStorage.getItem('tables')) || [];
        let evenements = JSON.parse(localStorage.getItem('evenements')) || [];
        
        const invite = invites.find(i => i.id == inviteId);
        
        if (!invite) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        } else {
            document.getElementById('loading').style.display = 'none';
            
            const table = tables.find(t => t.id === invite.tableId);
            const evenement = evenements.find(e => e.id === invite.evenementId) || evenements[0];
            
            document.getElementById('content').style.display = 'block';
            document.getElementById('content').innerHTML = `
                <div class="invitation-card">
                    <div class="invitation-header">
                        <h1>${evenement ? evenement.nom : 'Mariage'}</h1>
                        <p>Vous invitent à célébrer leur union</p>
                    </div>
                    
                    <div class="couple-photo" style="background-image: url('${evenement ? evenement.photo : 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc'}')"></div>
                    
                    <div class="info-section">
                        <h3 class="text-center mb-4">Cher(e) ${invite.nom},</h3>
                        
                        <div class="row g-2 mb-4">
                            <div class="col-4">
                                <div class="info-item">
                                    <i class="fas fa-calendar"></i>
                                    <h6>Date</h6>
                                    <small>${evenement ? evenement.date : '07/03/2026'}</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="info-item">
                                    <i class="fas fa-clock"></i>
                                    <h6>Heure</h6>
                                    <small>${evenement ? evenement.heure : '19:00'}</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="info-item">
                                    <i class="fas fa-map-marker"></i>
                                    <h6>Lieu</h6>
                                    <small>${evenement ? evenement.lieu : 'GLORIOUS PALACE'}</small>
                                </div>
                            </div>
                        </div>
                        
                        ${table ? `
                            <div class="alert alert-info text-center">
                                <i class="fas fa-chair me-2"></i>
                                Table: <strong>${table.nom}</strong>
                            </div>
                        ` : ''}
                        
                        <h5 class="mt-4 mb-3">Vos boissons (optionnel)</h5>
                        <div class="row">
                            <div class="col-6">
                                <div class="boisson-option ${invite.boisson1 ? 'selected' : ''}" onclick="choisirBoisson(1)">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="boisson1" id="b1" ${invite.boisson1 ? 'checked' : ''}>
                                        <label>1er choix</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="boisson-option ${invite.boisson2 ? 'selected' : ''}" onclick="choisirBoisson(2)">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="boisson2" id="b2" ${invite.boisson2 ? 'checked' : ''}>
                                        <label>2ème choix</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <label class="form-label">Message (optionnel)</label>
                            <textarea id="message" class="form-control" rows="3">${invite.message || ''}</textarea>
                        </div>
                        
                        <div class="mt-4">
                            ${invite.confirmation === 'oui' ? `
                                <div class="alert alert-success">✓ Vous avez confirmé votre présence</div>
                            ` : invite.confirmation === 'refuse' ? `
                                <div class="alert alert-danger">✗ Vous avez refusé l'invitation</div>
                            ` : `
                                <button class="btn btn-gold" onclick="confirmer()">
                                    <i class="fas fa-check me-2"></i>Confirmer ma présence
                                </button>
                                <button class="btn btn-outline-danger w-100" onclick="refuser()">
                                    <i class="fas fa-times me-2"></i>Je ne pourrai pas venir
                                </button>
                            `}
                        </div>
                        
                        <div class="contact-info mt-4">
                            <h6><i class="fas fa-phone-alt me-2"></i>Contact</h6>
                            <p>${evenement ? evenement.telephone : '+243 82 124 8030'}</p>
                            <p>${evenement ? evenement.email : 'guelormuya2@gmail.com'}</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function choisirBoisson(num) {
            Swal.fire({
                title: 'Choix de boisson',
                html: `
                    <select id="boissonSelect" class="form-select">
                        <option value="">Aucune préférence</option>
                        <option value="vin">Vin</option>
                        <option value="biere">Bière</option>
                        <option value="champagne">Champagne</option>
                        <option value="jus">Jus</option>
                        <option value="eau">Eau</option>
                        <option value="soda">Soda</option>
                    </select>
                `,
                confirmButtonText: 'Valider',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const choix = document.getElementById('boissonSelect').value;
                    const index = invites.findIndex(i => i.id == inviteId);
                    if (index !== -1) {
                        if (num === 1) invites[index].boisson1 = choix;
                        else invites[index].boisson2 = choix;
                        localStorage.setItem('invites', JSON.stringify(invites));
                        window.location.reload();
                    }
                }
            });
        }
        
        function confirmer() {
            const message = document.getElementById('message')?.value || '';
            const index = invites.findIndex(i => i.id == inviteId);
            
            Swal.fire({
                title: 'Confirmation',
                text: 'Confirmer votre présence ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    invites[index].confirmation = 'oui';
                    invites[index].message = message;
                    localStorage.setItem('invites', JSON.stringify(invites));
                    Swal.fire('Merci!', 'Présence confirmée', 'success').then(() => {
                        window.location.reload();
                    });
                }
            });
        }
        
        function refuser() {
            const index = invites.findIndex(i => i.id == inviteId);
            
            Swal.fire({
                title: 'Refus',
                text: 'Vous ne pourrez pas venir ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    invites[index].confirmation = 'refuse';
                    localStorage.setItem('invites', JSON.stringify(invites));
                    Swal.fire('Merci', 'Réponse enregistrée', 'info').then(() => {
                        window.location.reload();
                    });
                }
            });
        }
    </script>
</body>
</html>
