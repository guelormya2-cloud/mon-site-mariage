<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .invitation-card {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .photo-hero {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
        }
        
        .content {
            padding: 30px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #D4AF37;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .info-item {
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-item i {
            color: #D4AF37;
            margin-right: 10px;
        }
        
        .boisson-option {
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .boisson-option:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }
        
        .btn-gold {
            background: #D4AF37;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .btn-gold:hover {
            background: #B8860B;
        }
        
        .btn-outline-gold {
            border: 2px solid #D4AF37;
            background: transparent;
            color: #D4AF37;
            padding: 12px 30px;
            border-radius: 50px;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .btn-outline-gold:hover {
            background: #D4AF37;
            color: white;
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .contact-info a {
            color: #D4AF37;
            text-decoration: none;
        }
        
        .message-personnalise {
            font-style: italic;
            color: #666;
            border-left: 4px solid #D4AF37;
            padding-left: 20px;
            margin: 20px 0;
            font-size: 1.2em;
        }
        
        .table-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .photo-hero {
                height: 250px;
            }
            .content {
                padding: 20px;
            }
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div id="loading" style="text-align: center; padding: 50px; color: white;">
        <div class="spinner-border" role="status"></div>
        <p>Chargement de votre invitation...</p>
    </div>
    
    <div id="content" style="display: none;"></div>

    <script>
        // Récupérer les données de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        
        if (!dataStr) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').innerHTML = `
                <div class="invitation-card">
                    <div class="content text-center py-5">
                        <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                        <h3>Invitation non trouvée</h3>
                        <p>Le lien que vous avez utilisé n'est pas valide.</p>
                    </div>
                </div>
            `;
            document.getElementById('content').style.display = 'block';
        } else {
            try {
                // Décoder les données
                const data = JSON.parse(atob(decodeURIComponent(dataStr)));
                
                document.getElementById('loading').style.display = 'none';
                
                // Afficher l'invitation
                document.getElementById('content').innerHTML = `
                    <div class="invitation-card">
                        <div class="photo-hero" style="background-image: url('${data.evenementPhoto}')"></div>
                        
                        <div class="content">
                            <div class="header">
                                <h1>${data.evenementNom}</h1>
                                <p class="lead">Cher(e) ${data.nom},</p>
                            </div>
                            
                            ${data.evenementMessage ? `
                                <div class="message-personnalise">
                                    <i class="fas fa-quote-left text-gold me-2"></i>
                                    ${data.evenementMessage}
                                </div>
                            ` : ''}
                            
                            <div class="info-item">
                                <i class="fas fa-calendar"></i>
                                <strong>Date:</strong> ${data.evenementDate}
                            </div>
                            
                            <div class="info-item">
                                <i class="fas fa-clock"></i>
                                <strong>Heure:</strong> ${data.evenementHeure}
                            </div>
                            
                            <div class="info-item">
                                <i class="fas fa-map-marker"></i>
                                <strong>Lieu:</strong> ${data.evenementLieu}<br>
                                <small>${data.evenementAdresse}</small>
                            </div>
                            
                            ${data.tableNom ? `
                                <div class="table-info">
                                    <i class="fas fa-chair me-2"></i>
                                    Vous serez à la table: <strong>${data.tableNom}</strong>
                                </div>
                            ` : ''}
                            
                            <h4 class="mt-4">Vos préférences</h4>
                            
                            <div class="boisson-option" onclick="choisirBoisson(1)">
                                <i class="fas fa-wine-glass-alt me-2"></i>
                                <strong>1er choix:</strong> ${data.boisson1 || 'Non choisi'}
                            </div>
                            
                            <div class="boisson-option" onclick="choisirBoisson(2)">
                                <i class="fas fa-glass-cheers me-2"></i>
                                <strong>2ème choix:</strong> ${data.boisson2 || 'Non choisi'}
                            </div>
                            
                            <div class="mt-4">
                                <label>Votre message (optionnel):</label>
                                <textarea id="messageInput" class="form-control" rows="3">${data.message || ''}</textarea>
                            </div>
                            
                            <div class="mt-4">
                                ${data.confirmation === 'oui' ? `
                                    <div class="alert alert-success">
                                        <i class="fas fa-check-circle me-2"></i>
                                        Vous avez confirmé votre présence
                                    </div>
                                ` : data.confirmation === 'refuse' ? `
                                    <div class="alert alert-danger">
                                        <i class="fas fa-times-circle me-2"></i>
                                        Vous avez refusé l'invitation
                                    </div>
                                ` : `
                                    <button class="btn-gold" onclick="confirmerPresence()">
                                        <i class="fas fa-check-circle me-2"></i>Confirmer ma présence
                                    </button>
                                    <button class="btn-outline-gold" onclick="refuserPresence()">
                                        <i class="fas fa-times-circle me-2"></i>Je ne pourrai pas venir
                                    </button>
                                `}
                            </div>
                            
                            <div class="contact-info">
                                <div class="row">
                                    <div class="col-6">
                                        <h5><i class="fas fa-phone-alt me-2"></i>Contact</h5>
                                        <p><a href="tel:${data.evenementTelephone}">${data.evenementTelephone}</a></p>
                                    </div>
                                    <div class="col-6">
                                        <h5><i class="fas fa-envelope me-2"></i>Email</h5>
                                        <p><a href="mailto:${data.evenementEmail}">${data.evenementEmail}</a></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
                
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = `
                    <div class="invitation-card">
                        <div class="content text-center py-5">
                            <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                            <h3>Erreur de chargement</h3>
                            <p>Impossible de charger l'invitation.</p>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
            }
        }
        
        function choisirBoisson(numero) {
            alert('Pour modifier vos préférences, veuillez contacter l\'organisateur');
        }
        
        function confirmerPresence() {
            alert('Pour confirmer votre présence, veuillez contacter l\'organisateur');
        }
        
        function refuserPresence() {
            alert('Pour refuser l\'invitation, veuillez contacter l\'organisateur');
        }
    </script>
</body>
</html>
