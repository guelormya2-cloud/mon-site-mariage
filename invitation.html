<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        
        .invitation-card {
            background: white;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .photo-hero {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .photo-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to top, white, transparent);
        }
        
        .invitation-header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: -50px;
            position: relative;
            z-index: 10;
            border-radius: 30px 30px 0 0;
        }
        
        .invitation-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }
        
        .event-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
        }
        
        .content-section {
            padding: 30px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .info-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        
        .info-item:hover {
            transform: translateY(-5px);
        }
        
        .info-item i {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .table-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .boissons-section {
            margin: 30px 0;
        }
        
        .boisson-option {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .boisson-option:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .boisson-option.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        .btn-outline-gold {
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            padding: 15px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-outline-gold:hover {
            background: var(--gold);
            color: white;
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 30px;
            margin-top: 30px;
        }
        
        .contact-info a {
            color: var(--gold);
            text-decoration: none;
        }
        
        .confirmation-status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .confirme {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .refuse {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .attente {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .message-personnalise {
            font-size: 1.2rem;
            font-style: italic;
            color: #666;
            border-left: 4px solid var(--gold);
            padding-left: 20px;
            margin: 30px 0;
        }
        
        @media (max-width: 768px) {
            .photo-hero { height: 250px; }
            .invitation-header h1 { font-size: 1.8rem; }
            .invitation-header { margin-top: -30px; padding: 30px 15px; }
            .content-section { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-light" style="width: 3rem; height: 3rem;"></div>
        <p class="text-white mt-3">Chargement de votre invitation...</p>
    </div>
    
    <div id="content" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        // Récupérer toutes les données depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        
        const invite = {
            id: urlParams.get('id'),
            nom: urlParams.get('nom') || 'Invité',
            email: urlParams.get('email'),
            telephone: urlParams.get('telephone'),
            tableNom: urlParams.get('tableNom'),
            boisson1: urlParams.get('boisson1') || '',
            boisson2: urlParams.get('boisson2') || '',
            message: urlParams.get('message') || '',
            confirmation: urlParams.get('confirmation') || 'non'
        };
        
        const evenement = {
            nom: urlParams.get('evenementNom') || 'Événement',
            type: urlParams.get('evenementType') || 'mariage',
            date: urlParams.get('evenementDate') || '07/03/2026',
            heure: urlParams.get('evenementHeure') || '19:00',
            lieu: urlParams.get('evenementLieu') || 'GLORIOUS PALACE',
            adresse: urlParams.get('evenementAdresse') || 'Kinshasa',
            telephone: urlParams.get('evenementTelephone') || '+243 82 124 8030',
            email: urlParams.get('evenementEmail') || 'contact@mariage.com',
            photo: urlParams.get('evenementPhoto') || 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80',
            messagePersonnalise: urlParams.get('evenementMessage') || ''
        };
        
        document.getElementById('loading').style.display = 'none';
        
        let confirmationClass = 'attente';
        let confirmationTexte = 'En attente de confirmation';
        
        if (invite.confirmation === 'oui') {
            confirmationClass = 'confirme';
            confirmationTexte = '✓ Présence confirmée';
        } else if (invite.confirmation === 'refuse') {
            confirmationClass = 'refuse';
            confirmationTexte = '✗ Présence refusée';
        }
        
        document.getElementById('content').innerHTML = `
            <div class="invitation-card">
                <div class="photo-hero" style="background-image: url('${evenement.photo}')"></div>
                
                <div class="invitation-header">
                    <span class="event-badge">
                        <i class="fas ${evenement.type === 'mariage' ? 'fa-heart' : evenement.type === 'bapteme' ? 'fa-dove' : evenement.type === 'anniversaire' ? 'fa-birthday-cake' : 'fa-calendar'} me-2"></i>
                        ${evenement.type.charAt(0).toUpperCase() + evenement.type.slice(1)}
                    </span>
                    <h1>${evenement.nom}</h1>
                    <p class="lead">Vous invitent à célébrer cet événement</p>
                </div>
                
                <div class="content-section">
                    <div class="text-center mb-4">
                        <h2 class="h3">Cher(e) ${invite.nom},</h2>
                        <p class="text-muted">Nous serions ravis de vous compter parmi nous</p>
                    </div>
                    
                    <div class="confirmation-status ${confirmationClass}">
                        <i class="fas ${invite.confirmation === 'oui' ? 'fa-check-circle' : invite.confirmation === 'refuse' ? 'fa-times-circle' : 'fa-clock'} me-2"></i>
                        ${confirmationTexte}
                    </div>
                    
                    ${evenement.messagePersonnalise ? `
                        <div class="message-personnalise">
                            <i class="fas fa-quote-left text-gold me-2"></i>
                            ${evenement.messagePersonnalise}
                        </div>
                    ` : ''}
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <i class="fas fa-calendar"></i>
                            <h4>Date</h4>
                            <p>${evenement.date}</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-clock"></i>
                            <h4>Heure</h4>
                            <p>${evenement.heure}</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker"></i>
                            <h4>Lieu</h4>
                            <p>${evenement.lieu}</p>
                            <small>${evenement.adresse}</small>
                        </div>
                    </div>
                    
                    ${invite.tableNom ? `
                        <div class="table-info">
                            <i class="fas fa-chair me-2"></i>
                            Vous serez à la table <strong>${invite.tableNom}</strong>
                        </div>
                    ` : ''}
                    
                    <div class="boissons-section">
                        <h4 class="text-center mb-3">Vos préférences</h4>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="boisson-option ${invite.boisson1 ? 'selected' : ''}" onclick="choisirBoisson(1)">
                                    <i class="fas fa-wine-glass-alt me-2"></i>
                                    <strong>1er choix :</strong> ${invite.boisson1 || 'Non choisi'}
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="boisson-option ${invite.boisson2 ? 'selected' : ''}" onclick="choisirBoisson(2)">
                                    <i class="fas fa-glass-cheers me-2"></i>
                                    <strong>2ème choix :</strong> ${invite.boisson2 || 'Non choisi'}
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <textarea id="messageInput" class="form-control" rows="3" placeholder="Laissez un message (optionnel)">${invite.message || ''}</textarea>
                        </div>
                        
                        <div class="mt-4">
                            ${invite.confirmation !== 'oui' && invite.confirmation !== 'refuse' ? `
                                <button class="btn btn-gold" onclick="confirmerPresence()">
                                    <i class="fas fa-check-circle me-2"></i>Confirmer ma présence
                                </button>
                                <button class="btn btn-outline-gold" onclick="refuserPresence()">
                                    <i class="fas fa-times-circle me-2"></i>Je ne pourrai pas venir
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="contact-info">
                        <div class="row">
                            <div class="col-md-6">
                                <h5><i class="fas fa-phone-alt me-2"></i>Contact</h5>
                                <p><a href="tel:${evenement.telephone}">${evenement.telephone}</a></p>
                            </div>
                            <div class="col-md-6">
                                <h5><i class="fas fa-envelope me-2"></i>Email</h5>
                                <p><a href="mailto:${evenement.email}">${evenement.email}</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('content').style.display = 'block';
        
        function choisirBoisson(numero) {
            const options = [
                { value: '', label: 'Aucune préférence' },
                { value: 'vin', label: 'Vin' },
                { value: 'biere', label: 'Bière' },
                { value: 'champagne', label: 'Champagne' },
                { value: 'jus', label: 'Jus' },
                { value: 'eau', label: 'Eau' },
                { value: 'soda', label: 'Soda' }
            ];
            
            let selectHtml = '<select id="boissonSelect" class="form-select">';
            options.forEach(opt => {
                selectHtml += `<option value="${opt.value}">${opt.label}</option>`;
            });
            selectHtml += '</select>';
            
            Swal.fire({
                title: `Choix boisson ${numero}`,
                html: selectHtml,
                confirmButtonText: 'Valider',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Annuler'
            }).then((result) => {
                if (result.isConfirmed) {
                    const choix = document.getElementById('boissonSelect').value;
                    Swal.fire({
                        title: 'Merci !',
                        text: choix ? `Vous avez choisi : ${options.find(o => o.value === choix)?.label}` : 'Aucune boisson choisie',
                        icon: 'success',
                        confirmButtonColor: '#D4AF37'
                    });
                }
            });
        }
        
        function confirmerPresence() {
            const message = document.getElementById('messageInput')?.value || '';
            
            Swal.fire({
                title: 'Confirmer votre présence',
                text: 'Nous sommes heureux de vous compter parmi nous !',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Oui, je serai présent',
                cancelButtonText: 'Annuler'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Merci !',
                        text: 'Votre présence est confirmée. Nous avons hâte de vous voir !',
                        icon: 'success',
                        confirmButtonColor: '#D4AF37'
                    }).then(() => {
                        window.location.reload();
                    });
                }
            });
        }
        
        function refuserPresence() {
            Swal.fire({
                title: 'Refuser l\'invitation',
                text: 'Nous sommes désolés que vous ne puissiez pas venir.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Oui, je ne pourrai pas venir',
                cancelButtonText: 'Annuler'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Réponse enregistrée',
                        text: 'Merci de nous avoir prévenus.',
                        icon: 'info',
                        confirmButtonColor: '#D4AF37'
                    }).then(() => {
                        window.location.reload();
                    });
                }
            });
        }
    </script>
</body>
</html>
