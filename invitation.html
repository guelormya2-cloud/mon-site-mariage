<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation - Equinoxe Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .invitation-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .photo-section {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
        }
        
        .content-section {
            padding: 30px;
        }
        
        .guest-name {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }
        
        .special-message {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 20px;
        }
        
        .invitation-text {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid var(--gold);
        }
        
        .event-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .detail-item i {
            width: 30px;
            color: var(--gold);
            font-size: 1.2rem;
        }
        
        .btn-download {
            background: var(--gold);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            width: 100%;
            font-weight: 600;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-download:hover {
            background: var(--dark-gold);
            transform: translateY(-2px);
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .contact-info a {
            color: var(--gold);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .photo-section {
                height: 250px;
            }
            .guest-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <div id="loading" class="text-center py-5 text-white">
            <div class="spinner-border"></div>
            <p class="mt-3">Chargement de votre invitation...</p>
        </div>
        
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        
        if (!dataStr) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').innerHTML = `
                <div class="invitation-card">
                    <div class="content-section text-center py-5">
                        <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                        <h3>Invitation non trouvée</h3>
                    </div>
                </div>
            `;
            document.getElementById('content').style.display = 'block';
        } else {
            try {
                const data = JSON.parse(atob(decodeURIComponent(dataStr)));
                
                document.getElementById('loading').style.display = 'none';
                
                document.getElementById('content').innerHTML = `
                    <div class="invitation-card">
                        <div class="photo-section" style="background-image: url('${data.evenementPhoto || 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc'}')"></div>
                        
                        <div class="content-section">
                            <div class="guest-name">${data.civilite ? data.civilite + ' ' : ''}${data.nom}</div>
                            
                            <div class="special-message">
                                <i class="fas fa-star me-2"></i>
                                Vous êtes notre invité(e) spécial(e)
                            </div>
                            
                            <div class="invitation-text">
                                <p>Cliquez sur le lien ci-dessous pour visualiser et télécharger votre invitation :</p>
                                <div class="alert alert-secondary">
                                    <i class="fas fa-link me-2"></i>
                                    ${window.location.href}
                                </div>
                            </div>
                            
                            <button class="btn-download" onclick="alert('Pour télécharger, faites une capture d\'écran ou utilisez l\'impression PDF')">
                                <i class="fas fa-download me-2"></i>
                                Télécharger mon invitation
                            </button>
                            
                            <div class="event-details">
                                <h5 class="mb-3"><i class="fas fa-calendar-alt me-2" style="color: var(--gold);"></i>Détails de l'événement</h5>
                                
                                <div class="detail-item">
                                    <i class="fas fa-calendar-day"></i>
                                    <div><strong>Date :</strong> ${data.evenementDate || '07/03/2026'}</div>
                                </div>
                                
                                <div class="detail-item">
                                    <i class="fas fa-clock"></i>
                                    <div><strong>Heure :</strong> ${data.evenementHeure || '19:00'}</div>
                                </div>
                                
                                <div class="detail-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <div><strong>Lieu :</strong> ${data.evenementLieu || 'GLORIOUS PALACE'}</div>
                                </div>
                                
                                ${data.tableNom ? `
                                <div class="detail-item">
                                    <i class="fas fa-chair"></i>
                                    <div><strong>Table :</strong> ${data.tableNom}</div>
                                </div>
                                ` : ''}
                            </div>
                            
                            <div class="contact-info">
                                <h5 class="mb-3"><i class="fas fa-phone-alt me-2"></i>Contact organisateur</h5>
                                <p><i class="fas fa-phone me-2"></i> <a href="tel:${data.evenementTelephone || '+243821248030'}">${data.evenementTelephone || '+243 82 124 8030'}</a></p>
                                <p><i class="fas fa-envelope me-2"></i> <a href="mailto:${data.evenementEmail || 'contact@equinoxe-events.com'}">${data.evenementEmail || 'contact@equinoxe-events.com'}</a></p>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = `
                    <div class="invitation-card">
                        <div class="content-section text-center py-5">
                            <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                            <h3>Erreur de chargement</h3>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
            }
        }
    </script>
</body>
</html>
