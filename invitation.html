<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation - Equinoxe Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
            --light-beige: #f8f5f0;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .invitation-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        .invitation-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .photo-section {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--gold);
        }
        
        .content-section {
            padding: 30px;
        }
        
        .guest-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 5px;
            font-family: 'Playfair Display', serif;
        }
        
        .special-message {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--gold);
        }
        
        .invitation-text {
            background: var(--light-beige);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.8;
            border-left: 4px solid var(--gold);
        }
        
        .invitation-link {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            color: #0066cc;
            margin: 20px 0;
            border: 1px solid #ddd;
        }
        
        .btn-download {
            background: var(--gold);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            width: 100%;
            font-size: 1.1em;
            font-weight: 600;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-download:hover {
            background: var(--dark-gold);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        .event-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .detail-item i {
            width: 30px;
            color: var(--gold);
            font-size: 1.2rem;
        }
        
        .detail-item strong {
            margin-right: 5px;
            color: var(--dark-gray);
        }
        
        .contact-info {
            background: var(--black);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .contact-info a {
            color: var(--gold);
            text-decoration: none;
        }
        
        .contact-info i {
            color: var(--gold);
            margin-right: 10px;
        }
        
        .footer-logo {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        
        .footer-logo span {
            color: var(--gold);
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .photo-section {
                height: 200px;
            }
            
            .guest-name {
                font-size: 1.8rem;
            }
            
            .content-section {
                padding: 20px;
            }
            
            .invitation-text {
                padding: 15px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <div id="loading" style="text-align: center; color: white; padding: 50px;">
            <div class="spinner-border" role="status"></div>
            <p class="mt-3">Chargement de votre invitation...</p>
        </div>
        
        <div id="content" style="display: none;"></div>
        
        <div id="error" style="display: none;">
            <div class="invitation-card">
                <div class="content-section text-center py-5">
                    <i class="fas fa-exclamation-circle fa-4x text-danger mb-3"></i>
                    <h3>Invitation non trouvée</h3>
                    <p class="text-muted">Le lien que vous avez utilisé n'est pas valide.</p>
                    <p class="mt-3">Veuillez contacter l'organisateur pour obtenir un nouveau lien.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Récupérer les données de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        
        if (!dataStr) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        } else {
            try {
                const data = JSON.parse(atob(decodeURIComponent(dataStr)));
                
                // URL complète pour l'affichage
                const fullUrl = window.location.href;
                
                document.getElementById('loading').style.display = 'none';
                
                document.getElementById('content').innerHTML = `
                    <div class="invitation-card">
                        <div class="photo-section" style="background-image: url('${data.evenementPhoto || 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80'}')"></div>
                        
                        <div class="content-section">
                            <div class="guest-name">${data.nom}</div>
                            
                            <div class="special-message">
                                <i class="fas fa-star me-2"></i>
                                Vous êtes notre invité(e) spécial(e)
                            </div>
                            
                            <div class="invitation-text">
                                <p class="mb-2">Cliquez sur le lien ci-dessous pour visualiser et télécharger votre invitation :</p>
                                <div class="invitation-link">
                                                    <i class="fas fa-link me-2" style="color: var(--gold);"></i>
                                    ${fullUrl}
                                </div>
                            </div>
                            
                            <button class="btn-download" onclick="telechargerInvitation()">
                                <i class="fas fa-download"></i>
                                Télécharger mon invitation
                            </button>
                            
                            <div class="event-details">
                                <h5 class="mb-3"><i class="fas fa-calendar-alt me-2" style="color: var(--gold);"></i>Détails de l'événement</h5>
                                
                                <div class="detail-item">
                                    <i class="fas fa-calendar-day"></i>
                                    <div><strong>Date :</strong> ${data.evenementDate || '07/03/2026'}</div>
                                </div>
                                
                                <div class="detail-item">
                                    <i class="fas fa-clock"></i>
                                    <div><strong>Heure :</strong> ${data.evenementHeure || '19:00'}</div>
                                </div>
                                
                                <div class="detail-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <div><strong>Lieu :</strong> ${data.evenementLieu || 'GLORIOUS PALACE'}</div>
                                </div>
                                
                                <div class="detail-item">
                                    <i class="fas fa-location-dot"></i>
                                    <div><strong>Adresse :</strong> ${data.evenementAdresse || 'Av. Mvunda 21, Kinshasa'}</div>
                                </div>
                            </div>
                            
                            ${data.evenementMessage ? `
                                <div class="alert alert-info mt-3">
                                    <i class="fas fa-quote-left me-2" style="color: var(--gold);"></i>
                                    ${data.evenementMessage}
                                </div>
                            ` : ''}
                            
                            <div class="contact-info">
                                <h5 class="mb-3"><i class="fas fa-phone-alt"></i>Contact organisateur</h5>
                                <p><i class="fas fa-phone"></i> <a href="tel:${data.evenementTelephone || '+243821248030'}">${data.evenementTelephone || '+243 82 124 8030'}</a></p>
                                <p><i class="fas fa-envelope"></i> <a href="mailto:${data.evenementEmail || 'guelormuya2@gmail.com'}">${data.evenementEmail || 'guelormuya2@gmail.com'}</a></p>
                            </div>
                            
                            <div class="footer-logo">
                                Invitation envoyée via <span>Equinoxe Events</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('content').style.display = 'block';
                
            } catch (e) {
                console.error('Erreur:', e);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }
        
        function telechargerInvitation() {
            // Créer un élément canvas pour capturer l'invitation
            const element = document.querySelector('.invitation-card');
            
            // Option 1: Guide pour capture d'écran
            alert('Pour télécharger votre invitation :\n\n1. Faites une capture d\'écran (Volume bas + Power sur Android)\n2. Ou utilisez l\'impression PDF (Menu > Imprimer > Enregistrer au format PDF)');
            
            // Option 2: Ouvrir la boîte de dialogue d'impression
            // window.print();
        }
    </script>
</body>
</html>
