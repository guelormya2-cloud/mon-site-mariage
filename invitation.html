<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invitation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        
        .invitation-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .invitation-header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .invitation-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }
        
        .couple-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid white;
            margin: -100px auto 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        
        .info-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-item i {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .table-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 0 30px 30px;
            text-align: center;
        }
        
        .boissons-section {
            padding: 0 30px 30px;
        }
        
        .boisson-option {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .boisson-option.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        .contact-info {
            background: #333;
            color: white;
            padding: 30px;
            margin-top: 20px;
        }
        
        .contact-info a {
            color: var(--gold);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .invitation-header h1 {
                font-size: 1.8rem;
            }
            
            .couple-photo {
                width: 150px;
                height: 150px;
                margin-top: -75px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-light" style="width: 3rem; height: 3rem;"></div>
            <p class="text-white mt-3">Chargement de votre invitation...</p>
        </div>
        
        <div id="error" class="text-center py-5 text-white" style="display: none;">
            <i class="fas fa-exclamation-circle fa-4x mb-3"></i>
            <h3>Invitation non trouvée</h3>
            <p>Le lien que vous avez utilisé n'est pas valide.</p>
        </div>
        
        <div id="content" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const inviteId = urlParams.get('id');
        
        let invites = JSON.parse(localStorage.getItem('invites')) || [];
        let tables = JSON.parse(localStorage.getItem('tables')) || [];
        let evenements = JSON.parse(localStorage.getItem('evenements')) || [];
        
        const invite = invites.find(i => i.id == inviteId);
        
        if (!invite) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        } else {
            document.getElementById('loading').style.display = 'none';
            
            const table = tables.find(t => t.id === invite.tableId);
            const evenement = evenements.find(e => e.id === invite.evenementId) || {
                nom: 'Événement',
                date: '07/03/2026',
                heure: '19:00',
                lieu: 'GLORIOUS PALACE',
                adresse: 'Kinshasa',
                telephone: '+243 82 124 8030',
                email: 'contact@mariage.com',
                photo: 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80'
            };
            
            document.getElementById('content').style.display = 'block';
            document.getElementById('content').innerHTML = `
                <div class="invitation-card">
                    <div class="invitation-header">
                        <h1>${evenement.nom}</h1>
                        <p class="lead">Vous invitent à célébrer leur union</p>
                    </div>
                    
                    <div class="couple-photo" style="background-image: url('${evenement.photo}')"></div>
                    
                    <div class="text-center mt-4">
                        <h2 class="h3">Cher(e) ${invite.nom},</h2>
                        <p class="text-muted">Nous serions ravis de vous compter parmi nous</p>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <i class="fas fa-calendar"></i>
                            <h4>Date</h4>
                            <p>${evenement.date}</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-clock"></i>
                            <h4>Heure</h4>
                            <p>${evenement.heure}</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker"></i>
                            <h4>Lieu</h4>
                            <p>${evenement.lieu}</p>
                            <small>${evenement.adresse}</small>
                        </div>
                    </div>
                    
                    ${table ? `
                        <div class="table-info">
                            <i class="fas fa-chair me-2"></i>
                            Vous serez à la table <strong>${table.nom}</strong>
                        </div>
                    ` : ''}
                    
                    <div class="boissons-section">
                        <h4 class="text-center mb-3">Vos préférences (optionnel)</h4>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="boisson-option ${invite.boisson1 ? 'selected' : ''}" onclick="choisirBoisson(1)">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="boisson1" ${invite.boisson1 ? 'checked' : ''}>
                                        <label>1er choix : ${invite.boisson1 || 'Non choisi'}</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="boisson-option ${invite.boisson2 ? 'selected' : ''}" onclick="choisirBoisson(2)">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="boisson2" ${invite.boisson2 ? 'checked' : ''}>
                                        <label>2ème choix : ${invite.boisson2 || 'Non choisi'}</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <label class="form-label">Message (optionnel)</label>
                            <textarea id="message" class="form-control" rows="3">${invite.message || ''}</textarea>
                        </div>
                        
                        <div class="mt-4">
                            ${invite.confirmation === 'oui' ? `
                                <div class="alert alert-success text-center">
                                    <i class="fas fa-check-circle me-2"></i>
                                    Vous avez confirmé votre présence. Merci !
                                </div>
                            ` : invite.confirmation === 'refuse' ? `
                                <div class="alert alert-danger text-center">
                                    <i class="fas fa-times-circle me-2"></i>
                                    Vous avez décliné l'invitation.
                                </div>
                            ` : `
                                <button class="btn btn-gold" onclick="confirmer()">
                                    <i class="fas fa-check-circle me-2"></i>Confirmer ma présence
                                </button>
                                <button class="btn btn-outline-danger w-100" onclick="refuser()">
                                    <i class="fas fa-times-circle me-2"></i>Je ne pourrai pas venir
                                </button>
                            `}
                        </div>
                    </div>
                    
                    <div class="contact-info">
                        <div class="row">
                            <div class="col-md-6">
                                <h5><i class="fas fa-phone-alt me-2"></i>Contact</h5>
                                <p>${evenement.telephone}</p>
                            </div>
                            <div class="col-md-6">
                                <h5><i class="fas fa-envelope me-2"></i>Email</h5>
                                <p>${evenement.email}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function choisirBoisson(num) {
            const options = ['vin', 'biere', 'champagne', 'jus', 'eau', 'soda'];
            const labels = ['Vin', 'Bière', 'Champagne', 'Jus', 'Eau', 'Soda'];
            
            let selectHtml = '<select id="boissonSelect" class="form-select">';
            selectHtml += '<option value="">Aucune préférence</option>';
            options.forEach((opt, idx) => {
                selectHtml += `<option value="${opt}">${labels[idx]}</option>`;
            });
            selectHtml += '</select>';
            
            Swal.fire({
                title: `Choix boisson ${num}`,
                html: selectHtml,
                confirmButtonText: 'Valider',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const choix = document.getElementById('boissonSelect').value;
                    const index = invites.findIndex(i => i.id == inviteId);
                    if (index !== -1) {
                        if (num === 1) invites[index].boisson1 = choix;
                        else invites[index].boisson2 = choix;
                        localStorage.setItem('invites', JSON.stringify(invites));
                        window.location.reload();
                    }
                }
            });
        }
        
        function confirmer() {
            const message = document.getElementById('message')?.value || '';
            const index = invites.findIndex(i => i.id == inviteId);
            
            Swal.fire({
                title: 'Confirmation',
                text: 'Confirmez-vous votre présence ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    invites[index].confirmation = 'oui';
                    invites[index].message = message;
                    localStorage.setItem('invites', JSON.stringify(invites));
                    Swal.fire('Merci!', 'Votre présence est confirmée', 'success').then(() => {
                        window.location.reload();
                    });
                }
            });
        }
        
        function refuser() {
            const index = invites.findIndex(i => i.id == inviteId);
            
            Swal.fire({
                title: 'Refus',
                text: 'Vous ne pourrez pas venir ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    invites[index].confirmation = 'refuse';
                    localStorage.setItem('invites', JSON.stringify(invites));
                    Swal.fire('Réponse enregistrée', 'Merci de nous avoir prévenus', 'info').then(() => {
                        window.location.reload();
                    });
                }
            });
        }
    </script>
</body>
</html>
