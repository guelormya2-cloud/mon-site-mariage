<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des invités</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Vos styles existants */
    </style>
</head>
<body>
    <script>
        // Récupérer les données du localStorage
        let invites = JSON.parse(localStorage.getItem('invites')) || [];
        let evenements = JSON.parse(localStorage.getItem('evenements')) || [];
        let tables = JSON.parse(localStorage.getItem('tables')) || [];

        function genererLienInvitation(invite) {
            // Récupérer l'événement et la table associés
            const evenement = evenements.find(e => e.id === invite.evenementId) || {};
            const table = tables.find(t => t.id === invite.tableId) || {};
            
            // Créer l'objet avec toutes les données
            const data = {
                id: invite.id,
                nom: invite.nom,
                email: invite.email || '',
                telephone: invite.telephone || '',
                boisson1: invite.boisson1 || '',
                boisson2: invite.boisson2 || '',
                message: invite.message || '',
                confirmation: invite.confirmation || 'non',
                tableNom: table.nom || '',
                evenementNom: evenement.nom || '',
                evenementType: evenement.type || 'mariage',
                evenementDate: evenement.date || '',
                evenementHeure: evenement.heure || '',
                evenementLieu: evenement.lieu || '',
                evenementAdresse: evenement.adresse || '',
                evenementTelephone: evenement.telephone || '',
                evenementEmail: evenement.email || '',
                evenementPhoto: evenement.photo || '',
                evenementMessage: evenement.messagePersonnalise || ''
            };
            
            // Encoder les données en base64 pour un lien plus court
            const dataStr = btoa(JSON.stringify(data));
            
            // Retourner le lien
            return `${window.location.origin}/mon-site-mariage/invitation.html?data=${encodeURIComponent(dataStr)}`;
        }

        // Fonction pour copier le lien
        function copierLien(lien) {
            navigator.clipboard.writeText(lien).then(() => {
                alert('Lien copié !');
            });
        }

        // Fonction pour envoyer par WhatsApp
        function envoyerWhatsApp(lien, nom) {
            const message = `Bonjour ${nom}, voici votre invitation : ${lien}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`);
        }

        // Fonction pour envoyer par email
        function envoyerEmail(email, lien, nom) {
            if (!email) {
                alert('Email manquant');
                return;
            }
            const sujet = "Votre invitation";
            const corps = `Bonjour ${nom},\n\nCliquez sur ce lien pour voir votre invitation : ${lien}`;
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
        }

        // Afficher la liste des invités
        function afficherInvites() {
            const container = document.getElementById('invitesContainer');
            container.innerHTML = '';
            
            invites.forEach(invite => {
                const evenement = evenements.find(e => e.id === invite.evenementId) || { nom: 'Inconnu' };
                const lien = genererLienInvitation(invite);
                
                container.innerHTML += `
                    <div class="card mb-3">
                        <div class="card-body">
                            <h5>${invite.nom}</h5>
                            <p>Événement: ${evenement.nom}</p>
                            <p>Statut: ${invite.confirmation || 'Non confirmé'}</p>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-success" onclick="envoyerWhatsApp('${lien}', '${invite.nom}')">WhatsApp</button>
                                <button class="btn btn-sm btn-primary" onclick="envoyerEmail('${invite.email}', '${lien}', '${invite.nom}')">Email</button>
                                <button class="btn btn-sm btn-secondary" onclick="copierLien('${lien}')">Copier</button>
                            </div>
                            <small class="text-muted d-block mt-2">Lien: ${lien.substring(0, 50)}...</small>
                        </div>
                    </div>
                `;
            });
        }

        // Ajouter un nouvel invité
        function ajouterInvite() {
            const nom = prompt("Nom de l'invité:");
            if (!nom) return;
            
            const evenementId = prompt("ID de l'événement:");
            
            invites.push({
                id: Date.now(),
                nom: nom,
                evenementId: evenementId ? parseInt(evenementId) : null,
                email: '',
                telephone: '',
                boisson1: '',
                boisson2: '',
                message: '',
                confirmation: 'non'
            });
            
            localStorage.setItem('invites', JSON.stringify(invites));
            afficherInvites();
        }

        window.onload = afficherInvites;
    </script>

    <div class="container mt-4">
        <h1>Gestion des invités</h1>
        <button class="btn btn-primary mb-3" onclick="ajouterInvite()">Ajouter un invité</button>
        <div id="invitesContainer"></div>
    </div>
</body>
</html>
