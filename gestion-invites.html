<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des invités</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-gold: #B8860B; }
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #000 0%, #2c2c2c 100%); }
        .navbar-brand { color: var(--gold) !important; font-family: 'Playfair Display', serif; }
        .nav-link { color: white !important; }
        .btn-gold { background-color: var(--gold); border-color: var(--gold); color: white; }
        .btn-gold:hover { background-color: var(--dark-gold); }
        .guest-card { border: 1px solid #e9ecef; border-radius: 8px; margin-bottom: 15px; }
        .guest-header { background-color: var(--gold); color: white; padding: 10px; border-radius: 8px 8px 0 0; }
        .badge-confirme { background-color: #28a745; color: white; padding: 5px 10px; border-radius: 4px; }
        .badge-attente { background-color: #ffc107; color: black; padding: 5px 10px; border-radius: 4px; }
        .badge-refuse { background-color: #dc3545; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = '1-login.html';
        
        let invites = JSON.parse(localStorage.getItem('invites')) || [];
        let tables = JSON.parse(localStorage.getItem('tables')) || [];
        
        function sauvegarder() {
            localStorage.setItem('invites', JSON.stringify(invites));
            afficherInvites();
        }
        
        function genererLienInvitation(id) {
            return `https://guelormya2-cloud.github.io/mon-site-mariage/invitation.html?id=${id}`;
        }
    </script>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Gestion des invités</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="2-dashboard.html">Retour</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Filtres -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <select class="form-select" id="filtreTable" onchange="afficherInvites()">
                            <option value="">Toutes les tables</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select" id="filtreConfirmation" onchange="afficherInvites()">
                            <option value="">Tous les statuts</option>
                            <option value="oui">Confirmés</option>
                            <option value="non">En attente</option>
                            <option value="refuse">Refusés</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-gold w-100" onclick="ajouterInvite()">
                            <i class="fas fa-plus me-2"></i>Nouvel invité
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Liste des invités -->
        <div id="invitesContainer"></div>
    </div>

    <script>
        function afficherInvites() {
            const container = document.getElementById('invitesContainer');
            const filtreTable = document.getElementById('filtreTable').value;
            const filtreConfirmation = document.getElementById('filtreConfirmation').value;
            
            let invitesFiltres = invites;
            
            if (filtreTable) {
                invitesFiltres = invitesFiltres.filter(i => i.tableId == filtreTable);
            }
            
            if (filtreConfirmation) {
                invitesFiltres = invitesFiltres.filter(i => i.confirmation === filtreConfirmation);
            }
            
            container.innerHTML = '';
            
            invitesFiltres.forEach((invite, index) => {
                const table = tables.find(t => t.id === invite.tableId);
                const badgeClass = invite.confirmation === 'oui' ? 'badge-confirme' : 
                                  invite.confirmation === 'refuse' ? 'badge-refuse' : 'badge-attente';
                const badgeTexte = invite.confirmation === 'oui' ? 'Confirmé' :
                                  invite.confirmation === 'refuse' ? 'Refusé' : 'En attente';
                
                container.innerHTML += `
                    <div class="guest-card">
                        <div class="guest-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">${invite.nom}</h5>
                                <span class="${badgeClass}">${badgeTexte}</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <p><i class="fas fa-chair me-2"></i>Table: ${table ? table.nom : 'Non assigné'}</p>
                                    <p><i class="fas fa-envelope me-2"></i>${invite.email || 'Non renseigné'}</p>
                                    <p><i class="fas fa-phone me-2"></i>${invite.telephone || 'Non renseigné'}</p>
                                    <p><i class="fas fa-glass-cheers me-2"></i>Boisson: ${invite.boisson || 'Non choisi'}</p>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <strong>Message livre d'or:</strong>
                                        <p class="text-muted">"${invite.message || 'Aucun message'}"</p>
                                    </div>
                                    <div class="btn-group w-100">
                                        <button class="btn btn-outline-success" onclick='envoyerWhatsApp(${index})'>
                                            <i class="fab fa-whatsapp"></i>
                                        </button>
                                        <button class="btn btn-outline-primary" onclick='envoyerEmail(${index})'>
                                            <i class="fas fa-envelope"></i>
                                        </button>
                                        <button class="btn btn-outline-secondary" onclick='copierLien(${index})'>
                                            <i class="fas fa-link"></i>
                                        </button>
                                        <button class="btn btn-outline-warning" onclick='modifierInvite(${index})'>
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-outline-danger" onclick='supprimerInvite(${index})'>
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        function ajouterInvite() {
            let tableOptions = '<option value="">Sélectionner une table</option>';
            tables.forEach(t => { tableOptions += `<option value="${t.id}">${t.nom}</option>`; });
            
            Swal.fire({
                title: 'Nouvel invité',
                html: `
                    <input type="text" id="nom" class="swal2-input" placeholder="Nom complet" required>
                    <input type="email" id="email" class="swal2-input" placeholder="Email">
                    <input type="tel" id="telephone" class="swal2-input" placeholder="Téléphone">
                    <select id="tableId" class="swal2-input">${tableOptions}</select>
                `,
                confirmButtonText: 'Créer',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                preConfirm: () => {
                    const nom = document.getElementById('nom').value;
                    if (!nom) { Swal.showValidationMessage('Nom requis'); return false; }
                    
                    invites.push({
                        id: Date.now(),
                        nom: nom,
                        email: document.getElementById('email').value,
                        telephone: document.getElementById('telephone').value,
                        tableId: parseInt(document.getElementById('tableId').value) || null,
                        confirmation: 'non',
                        boisson: '',
                        message: '',
                        repas: ''
                    });
                    sauvegarder();
                }
            });
        }
        
        function modifierInvite(index) {
            const invite = invites[index];
            let tableOptions = '<option value="">Sélectionner une table</option>';
            tables.forEach(t => {
                const selected = t.id === invite.tableId ? 'selected' : '';
                tableOptions += `<option value="${t.id}" ${selected}>${t.nom}</option>`;
            });
            
            Swal.fire({
                title: 'Modifier invité',
                html: `
                    <input type="text" id="nom" class="swal2-input" value="${invite.nom}">
                    <input type="email" id="email" class="swal2-input" value="${invite.email || ''}">
                    <input type="tel" id="telephone" class="swal2-input" value="${invite.telephone || ''}">
                    <select id="tableId" class="swal2-input">${tableOptions}</select>
                    <select id="confirmation" class="swal2-input">
                        <option value="non" ${invite.confirmation === 'non' ? 'selected' : ''}>En attente</option>
                        <option value="oui" ${invite.confirmation === 'oui' ? 'selected' : ''}>Confirmé</option>
                        <option value="refuse" ${invite.confirmation === 'refuse' ? 'selected' : ''}>Refusé</option>
                    </select>
                    <select id="boisson" class="swal2-input">
                        <option value="">Choisir boisson</option>
                        <option value="vin" ${invite.boisson === 'vin' ? 'selected' : ''}>Vin</option>
                        <option value="biere" ${invite.boisson === 'biere' ? 'selected' : ''}>Bière</option>
                        <option value="jus" ${invite.boisson === 'jus' ? 'selected' : ''}>Jus</option>
                        <option value="eau" ${invite.boisson === 'eau' ? 'selected' : ''}>Eau</option>
                    </select>
                    <textarea id="message" class="swal2-textarea" placeholder="Message livre d'or">${invite.message || ''}</textarea>
                `,
                confirmButtonText: 'Modifier',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                preConfirm: () => {
                    invites[index] = {
                        ...invite,
                        nom: document.getElementById('nom').value,
                        email: document.getElementById('email').value,
                        telephone: document.getElementById('telephone').value,
                        tableId: parseInt(document.getElementById('tableId').value) || null,
                        confirmation: document.getElementById('confirmation').value,
                        boisson: document.getElementById('boisson').value,
                        message: document.getElementById('message').value
                    };
                    sauvegarder();
                }
            });
        }
        
        function supprimerInvite(index) {
            Swal.fire({
                title: 'Confirmation',
                text: 'Supprimer cet invité ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    invites.splice(index, 1);
                    sauvegarder();
                }
            });
        }
        
        function envoyerWhatsApp(index) {
            const invite = invites[index];
            const lien = genererLienInvitation(invite.id);
            const message = `Bonjour ${invite.nom}, voici votre invitation au mariage : ${lien}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function envoyerEmail(index) {
            const invite = invites[index];
            const lien = genererLienInvitation(invite.id);
            const sujet = "Invitation à notre mariage";
            const corps = `Bonjour ${invite.nom},\n\nVoici votre invitation : ${lien}`;
            window.location.href = `mailto:${invite.email}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
        }
        
        function copierLien(index) {
            const invite = invites[index];
            const lien = genererLienInvitation(invite.id);
            navigator.clipboard.writeText(lien).then(() => {
                Swal.fire('Copié!', 'Lien copié dans le presse-papier', 'success');
            });
        }
        
        // Remplir le filtre des tables
        tables.forEach(t => {
            document.getElementById('filtreTable').innerHTML += 
                `<option value="${t.id}">${t.nom}</option>`;
        });
        
        afficherInvites();
    </script>
</body>
</html>
