<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mariage Guelor & Naomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .login-container {
            max-width: 450px;
            width: 90%;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            border: 1px solid var(--gold);
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--black);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input-group {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ced4da;
        }
        
        .input-group-text {
            background-color: #f8f9fa;
            border: none;
            color: var(--dark-gray);
        }
        
        .form-control {
            border: none;
            padding: 12px 15px;
        }
        
        .form-control:focus {
            outline: none;
            box-shadow: none;
        }
        
        .btn-login {
            background-color: var(--gold);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-login:hover {
            background-color: var(--dark-gold);
            transform: translateY(-2px);
        }
        
        .alert {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-logo">Mariage Guelor & Naomie</div>
            
            <div class="login-header">
                <h2><i class="fas fa-lock me-2" style="color: var(--gold);"></i>Connexion</h2>
                <p class="text-muted">Espace organisateur</p>
            </div>
            
            <div id="alertMessage" class="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="alertText">Email ou mot de passe incorrect</span>
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Email" value="guelormuya2@gmail.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Mot de passe" value="Glm@1991" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Se connecter</span>
                    <span id="btnSpinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i> Connexion...</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            
            setTimeout(() => {
                if (email === "guelormuya2@gmail.com" && password === "Glm@1991") {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    // CORRECTION : redirection vers dashboard.html sans préfixe
                    window.location.href = 'dashboard.html';
                } else {
                    alertDiv.style.display = 'block';
                    btn.disabled = false;
                    btnText.style.display = 'inline-block';
                    btnSpinner.style.display = 'none';
                    
                    setTimeout(() => {
                        alertDiv.style.display = 'none';
                    }, 3000);
                }
            }, 1000);
        }

        // Vérification si déjà connecté
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
