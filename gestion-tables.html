<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des tables - Mariage Guelor & Naomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, #000 0%, #2c2c2c 100%);
            margin-bottom: 20px;
        }
        
        .navbar-brand {
            color: var(--gold) !important;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }
        
        .nav-link {
            color: white !important;
        }
        
        .btn-gold {
            background-color: var(--gold);
            border-color: var(--gold);
            color: white;
        }
        
        .btn-gold:hover {
            background-color: var(--dark-gold);
            border-color: var(--dark-gold);
            color: white;
        }
        
        .table-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 20px;
            background: white;
            transition: all 0.3s ease;
        }
        
        .table-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .table-header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
        }
        
        .table-header h5 {
            margin: 0;
            color: white;
            font-weight: 600;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <script>
        // Vérification de connexion
        (function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        })();

        // Données des tables
        let tables = JSON.parse(localStorage.getItem('tables')) || [];
        
        // Tables par défaut si aucune n'existe
        if (tables.length === 0) {
            tables = [
                { id: 1, nom: "VIP", capacite: 10 },
                { id: 2, nom: "Famille", capacite: 12 },
                { id: 3, nom: "Amis", capacite: 8 }
            ];
            localStorage.setItem('tables', JSON.stringify(tables));
        }
        
        function sauvegarder() {
            localStorage.setItem('tables', JSON.stringify(tables));
            afficherTables();
        }
    </script>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Gestion des tables</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-arrow-left me-1"></i>Retour
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Bouton d'ajout -->
        <div class="row mb-4">
            <div class="col-12">
                <button class="btn btn-gold" onclick="ajouterTable()">
                    <i class="fas fa-plus me-2"></i>Nouvelle table
                </button>
            </div>
        </div>
        
        <!-- Liste des tables -->
        <div class="row" id="tablesContainer">
            <!-- Les tables seront affichées ici -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        function afficherTables() {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';
            
            if (tables.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state">
                            <i class="fas fa-chair"></i>
                            <h5>Aucune table</h5>
                            <p>Cliquez sur "Nouvelle table" pour commencer</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            tables.forEach((table, index) => {
                container.innerHTML += `
                    <div class="col-md-4">
                        <div class="table-card">
                            <div class="table-header">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5><i class="fas fa-chair me-2"></i>${table.nom}</h5>
                                    <div>
                                        <button class="btn btn-sm btn-light me-1" onclick="modifierTable(${index})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-danger" onclick="supprimerTable(${index})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body">
                                <p><i class="fas fa-users me-2"></i>Capacité: <strong>${table.capacite} personnes</strong></p>
                                <p class="text-muted mb-0"><small>ID: ${table.id}</small></p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        function ajouterTable() {
            Swal.fire({
                title: 'Nouvelle table',
                html: `
                    <input type="text" id="nom" class="swal2-input" placeholder="Nom de la table">
                    <input type="number" id="capacite" class="swal2-input" placeholder="Capacité" value="10" min="1">
                `,
                confirmButtonText: 'Créer',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Annuler',
                preConfirm: () => {
                    const nom = document.getElementById('nom').value.trim();
                    if (!nom) {
                        Swal.showValidationMessage('Le nom est requis');
                        return false;
                    }
                    tables.push({ 
                        id: Date.now(), 
                        nom: nom.toUpperCase(), 
                        capacite: parseInt(document.getElementById('capacite').value) 
                    });
                    sauvegarder();
                }
            });
        }
        
        function modifierTable(index) {
            const table = tables[index];
            Swal.fire({
                title: 'Modifier la table',
                html: `
                    <input type="text" id="nom" class="swal2-input" value="${table.nom}">
                    <input type="number" id="capacite" class="swal2-input" value="${table.capacite}" min="1">
                `,
                confirmButtonText: 'Modifier',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Annuler',
                preConfirm: () => {
                    tables[index].nom = document.getElementById('nom').value.trim().toUpperCase();
                    tables[index].capacite = parseInt(document.getElementById('capacite').value);
                    sauvegarder();
                }
            });
        }
        
        function supprimerTable(index) {
            Swal.fire({
                title: 'Confirmation',
                text: `Supprimer la table ${tables[index].nom} ?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Oui, supprimer',
                cancelButtonText: 'Annuler'
            }).then((result) => {
                if (result.isConfirmed) {
                    tables.splice(index, 1);
                    sauvegarder();
                    Swal.fire('Supprimée!', 'Table supprimée avec succès', 'success');
                }
            });
        }
        
        // Initialisation
        afficherTables();
    </script>
</body>
</html>
