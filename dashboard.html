<!-- Modal d'AJOUT de table - NOUVELLE VERSION -->
<div class="modal fade" id="addTableModal" tabindex="-1" aria-labelledby="addTableModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addTableModalLabel">Ajouter une nouvelle table</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="POST" action="https://www.equinoxe-events.com/tables/create">
                <input type="hidden" name="_token" value="grG5sw9IpAEfbuz73ZdGxkwBy440oVAxVDfiue05" autocomplete="off">
                <!-- On utilise POST pour la création -->
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="table_nom" class="form-label">Nom de la table</label>
                        <input type="text" class="form-control" id="table_nom" name="nom_table" required>
                    </div>
                    <div class="mb-3">
                        <label for="table_capacite" class="form-label">Capacité (nombre de personnes)</label>
                        <input type="number" class="form-control" id="table_capacite" name="capacite" min="1" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-gold">Ajouter la table</button>
                </div>
            </form>
        </div>
    </div>
</div>
