<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Mariage Guelor & Naomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
            --light-beige: #f8f5f0;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            color: var(--dark-gray);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            color: var(--black);
        }
        
        .text-gold { color: var(--gold) !important; }
        .bg-gold { background-color: var(--gold) !important; }
        
        .navbar {
            background: linear-gradient(135deg, var(--black) 0%, var(--dark-gray) 100%);
        }
        
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--gold) !important;
        }
        
        .event-header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        
        .nav-tabs .nav-link {
            color: var(--dark-gray);
            font-weight: 500;
            border: none;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
        }
        
        .nav-tabs .nav-link.active {
            background-color: transparent;
            color: var(--gold);
            border-bottom: 3px solid var(--gold);
        }
        
        .stat-card {
            border: none;
            border-radius: 8px;
            transition: transform 0.3s ease;
            height: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .table-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            transition: all 0.3s ease;
            height: 100%;
            margin-bottom: 20px;
        }
        
        .table-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .table-card .card-header {
            background-color: var(--gold);
            color: white;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            padding: 15px;
        }
        
        .guest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .guest-item:last-child {
            border-bottom: none;
        }
        
        .guest-actions button {
            margin-left: 5px;
        }
        
        .btn-gold {
            background-color: var(--gold);
            border-color: var(--gold);
            color: white;
        }
        
        .btn-gold:hover {
            background-color: var(--dark-gold);
            border-color: var(--dark-gold);
            color: white;
        }
        
        .badge-confirmed {
            background-color: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .badge-pending {
            background-color: #ffc107;
            color: #000;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .progress {
            height: 5px;
            margin-top: 5px;
        }
        
        .admin-actions {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        
        .modal-header {
            background-color: var(--gold);
            color: white;
        }
        
        .modal-header .btn-close {
            color: white;
        }
        
        @media (max-width: 768px) {
            .nav-tabs .nav-link {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
            
            .event-header {
                padding: 2rem 0;
            }
            
            .display-4 {
                font-size: 2rem;
            }
            
            .guest-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .guest-actions {
                margin-top: 10px;
                width: 100%;
                display: flex;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn) {
                const path = window.location.pathname;
                const basePath = path.substring(0, path.lastIndexOf('/') + 1);
                window.location.href = basePath + 'login.html';
            }
        })();

        // Données des tables (chargées depuis localStorage ou par défaut)
        let tablesData = JSON.parse(localStorage.getItem('tablesData')) || [
            {
                nom: "MOUTARDE",
                capacite: 11,
                invites: [
                    "Cple TSHISENGE", "Cple Dieudonné", "Cple Mathieu",
                    "Mme Acoustique", "Cple Cedric", "Mr LUBUIMI", "Mme Fidèle"
                ]
            },
            {
                nom: "LA TEAM",
                capacite: 10,
                invites: [
                    "Cple NKENKA", "Cple HATSHIDI", "Cple MBUMBA",
                    "Cple MUAMBA", "Cple Dominique", "Cple KALU", "Cple Donald BIYENGE"
                ]
            },
            {
                nom: "AQUALIS",
                capacite: 10,
                invites: [
                    "Mr Rémi", "Mr Marc", "Mr Pascal", "Mr Lionnel",
                    "Cple Andy", "Cple Jean Marie NDA", "Cple Dady"
                ]
            },
            {
                nom: "SPRING",
                capacite: 8,
                invites: [
                    "Cple LEMA", "Cple MUDIMBI", "Cple BAKULU", "Cple BINTU", "Mr KABAMBA"
                ]
            },
            {
                nom: "VIP",
                capacite: 10,
                invites: [
                    "Cple Robert", "Cple BUASSA", "Cple Eddy",
                    "Mr MANGALA", "Mr MUTOMBO", "Mr SPARCK", "Mr MAKINA"
                ]
            },
            {
                nom: "TARTINE",
                capacite: 10,
                invites: [
                    "Cple KWETE", "Mme BEA", "Mme Rose", "Mme OBONGA",
                    "Cple Arsène", "Mr Tacite", "Mme Dorcas"
                ]
            },
            {
                nom: "FRES",
                capacite: 10,
                invites: [
                    "Mme Carmen", "Cple LUBANDA", "Cple KANKU",
                    "Cple MBUYI", "Cple TUMBA", "Mr Junior"
                ]
            },
            {
                nom: "MAYONNAISE",
                capacite: 12,
                invites: [
                    "Mme Fideline", "Mme MBOMBO", "Mme Marie", "Mme MISENGA",
                    "Mme BLANDINE", "Cple KATALAYI", "Mme Chimita", "Cple Olivier"
                ]
            },
            {
                nom: "FAST",
                capacite: 10,
                invites: [
                    "Cple Pasteur Pierre", "Mme Henriette", "Mme Abigael",
                    "Cple GAGA", "Cple Ceci", "Mr Héritier"
                ]
            },
            {
                nom: "GENIE",
                capacite: 10,
                invites: [
                    "Mme Parfaite", "Mr EBENE", "Mr Désiré",
                    "Mr Miglo", "Mr Bangula", "Cple Kasongo"
                ]
            }
        ];

        let currentTableIndex = null;
        let currentInviteIndex = null;
        let tableModal, inviteModal;

        function logout() {
            Swal.fire({
                title: 'Déconnexion',
                text: 'Êtes-vous sûr de vouloir vous déconnecter ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#D4AF37',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Oui',
                cancelButtonText: 'Non'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('userEmail');
                    const path = window.location.pathname;
                    const basePath = path.substring(0, path.lastIndexOf('/') + 1);
                    window.location.href = basePath + 'login.html';
                }
            });
        }
    </script>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Mariage Guelor & Naomie</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showTab('dashboard')">
                            <i class="fas fa-home me-1"></i>Tableau de bord
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showTab('guests')">
                            <i class="fas fa-users me-1"></i>Invitations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="showTab('tables')">
                            <i class="fas fa-chair me-1"></i>Plans de table
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:void(0)" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- En-tête de l'événement -->
    <div class="event-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="display-4 text-gold">Mariage de Guelor et Naomie</h1>
                    <p class="lead">07/03/2026 • Salle GLORIOUS PALACE</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="bg-gold text-dark d-inline-block px-3 py-2 rounded">
                        <small>Code événement:</small>
                        <div class="h5 mb-0">EVT-2026-001</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <!-- Barre d'actions pour les tables -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <i class="fas fa-cog text-gold me-2"></i>Gestion des tables
                        </h5>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <button class="btn btn-gold w-100" onclick="ajouterTable()">
                                    <i class="fas fa-plus-circle me-2"></i>Nouvelle table
                                </button>
                            </div>
                            <div class="col-md-4 mb-2">
                                <button class="btn btn-success w-100" onclick="sauvegarderDonnees()">
                                    <i class="fas fa-save me-2"></i>Sauvegarder
                                </button>
                            </div>
                            <div class="col-md-4 mb-2">
                                <button class="btn btn-info w-100 text-white" onclick="ajouterInvite()">
                                    <i class="fas fa-user-plus me-2"></i>Nouvel invité
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Liste des tables -->
        <div class="row" id="tablesContainer"></div>
    </div>

    <!-- Modal Table -->
    <div class="modal fade" id="tableModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tableModalTitle">Ajouter une table</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="tableForm">
                        <div class="mb-3">
                            <label class="form-label">Nom de la table</label>
                            <input type="text" class="form-control" id="tableNom" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Capacité</label>
                            <input type="number" class="form-control" id="tableCapacite" min="1" value="10" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-gold" onclick="sauvegarderTable()">Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Invité -->
    <div class="modal fade" id="inviteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="inviteModalTitle">Ajouter un invité</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="inviteForm">
                        <div class="mb-3">
                            <label class="form-label">Nom de l'invité</label>
                            <input type="text" class="form-control" id="inviteNom" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Table</label>
                            <select class="form-select" id="inviteTable"></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-gold" onclick="sauvegarderInvite()">Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            tableModal = new bootstrap.Modal(document.getElementById('tableModal'));
            inviteModal = new bootstrap.Modal(document.getElementById('inviteModal'));
            afficherTables();
            mettreAJourStats();
        });

        function showTab(tabName) {
            // Cette fonction peut être utilisée pour naviguer entre les onglets
            console.log('Navigation vers', tabName);
        }

        function afficherTables() {
            const container = document.getElementById('tablesContainer');
            if (!container) return;
            
            container.innerHTML = '';

            tablesData.forEach((table, index) => {
                const placesOccupees = table.invites.length;
                const pourcentage = (placesOccupees / table.capacite) * 100;
                
                const card = document.createElement('div');
                card.className = 'col-lg-4 col-md-6';
                card.innerHTML = `
                    <div class="table-card">
                        <div class="card-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="fas fa-chair me-2"></i>${table.nom}</h5>
                                <div>
                                    <button class="btn btn-sm btn-light me-1" onclick="modifierTable(${index})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="supprimerTable(${index})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mt-2">
                                <small>${placesOccupees}/${table.capacite} places</small>
                                <div class="progress">
                                    <div class="progress-bar ${pourcentage >= 90 ? 'bg-danger' : pourcentage >= 70 ? 'bg-warning' : 'bg-success'}" 
                                         style="width: ${pourcentage}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            ${table.invites.map((invite, i) => `
                                <div class="guest-item">
                                    <span><i class="fas fa-user me-2"></i>${invite}</span>
                                    <div class="guest-actions">
                                        <button class="btn btn-sm btn-outline-primary" onclick="modifierInvite(${index}, ${i})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="supprimerInvite(${index}, ${i})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                            <button class="btn btn-sm btn-outline-success w-100 mt-2" onclick="ajouterInviteTable(${index})">
                                <i class="fas fa-plus me-2"></i>Ajouter un invité
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function mettreAJourStats() {
            // Mise à jour des stats si besoin
        }

        function ajouterTable() {
            currentTableIndex = null;
            document.getElementById('tableModalTitle').textContent = 'Ajouter une table';
            document.getElementById('tableNom').value = '';
            document.getElementById('tableCapacite').value = '10';
            tableModal.show();
        }

        function modifierTable(index) {
            currentTableIndex = index;
            document.getElementById('tableModalTitle').textContent = 'Modifier la table';
            document.getElementById('tableNom').value = tablesData[index].nom;
            document.getElementById('tableCapacite').value = tablesData[index].capacite;
            tableModal.show();
        }

        function sauvegarderTable() {
            const nom = document.getElementById('tableNom').value.trim().toUpperCase();
            const capacite = parseInt(document.getElementById('tableCapacite').value);
            
            if (!nom) {
                Swal.fire('Erreur', 'Le nom est requis', 'error');
                return;
            }
            
            if (currentTableIndex !== null) {
                tablesData[currentTableIndex].nom = nom;
                tablesData[currentTableIndex].capacite = capacite;
            } else {
                tablesData.push({ nom, capacite, invites: [] });
            }
            
            localStorage.setItem('tablesData', JSON.stringify(tablesData));
            tableModal.hide();
            afficherTables();
            Swal.fire('Succès', 'Table sauvegardée', 'success');
        }

        function supprimerTable(index) {
            Swal.fire({
                title: 'Confirmation',
                text: `Supprimer la table ${tablesData[index].nom} ?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Oui, supprimer'
            }).then((result) => {
                if (result.isConfirmed) {
                    tablesData.splice(index, 1);
                    localStorage.setItem('tablesData', JSON.stringify(tablesData));
                    afficherTables();
                }
            });
        }

        function ajouterInvite() {
            currentTableIndex = null;
            currentInviteIndex = null;
            document.getElementById('inviteModalTitle').textContent = 'Ajouter un invité';
            document.getElementById('inviteNom').value = '';
            const select = document.getElementById('inviteTable');
            select.innerHTML = '<option value="">Choisir une table</option>' +
                tablesData.map((t, i) => `<option value="${i}">${t.nom}</option>`).join('');
            inviteModal.show();
        }

        function ajouterInviteTable(index) {
            currentTableIndex = index;
            currentInviteIndex = null;
            document.getElementById('inviteModalTitle').textContent = 'Ajouter un invité';
            document.getElementById('inviteNom').value = '';
            const select = document.getElementById('inviteTable');
            select.innerHTML = tablesData.map((t, i) => 
                `<option value="${i}" ${i === index ? 'selected' : ''}>${t.nom}</option>`
            ).join('');
            inviteModal.show();
        }

        function modifierInvite(tableIndex, inviteIndex) {
            currentTableIndex = tableIndex;
            currentInviteIndex = inviteIndex;
            document.getElementById('inviteModalTitle').textContent = 'Modifier l\'invité';
            document.getElementById('inviteNom').value = tablesData[tableIndex].invites[inviteIndex];
            const select = document.getElementById('inviteTable');
            select.innerHTML = tablesData.map((t, i) => 
                `<option value="${i}" ${i === tableIndex ? 'selected' : ''}>${t.nom}</option>`
            ).join('');
            inviteModal.show();
        }

        function sauvegarderInvite() {
            const nom = document.getElementById('inviteNom').value.trim();
            const tableIndex = parseInt(document.getElementById('inviteTable').value);
            
            if (!nom) {
                Swal.fire('Erreur', 'Le nom est requis', 'error');
                return;
            }
            
            if (isNaN(tableIndex)) {
                Swal.fire('Erreur', 'Veuillez choisir une table', 'error');
                return;
            }
            
            if (currentTableIndex !== null && currentInviteIndex !== null) {
                tablesData[currentTableIndex].invites[currentInviteIndex] = nom;
                if (currentTableIndex !== tableIndex) {
                    tablesData[currentTableIndex].invites.splice(currentInviteIndex, 1);
                    tablesData[tableIndex].invites.push(nom);
                }
            } else {
                tablesData[tableIndex].invites.push(nom);
            }
            
            localStorage.setItem('tablesData', JSON.stringify(tablesData));
            inviteModal.hide();
            afficherTables();
            Swal.fire('Succès', 'Invité sauvegardé', 'success');
        }

        function supprimerInvite(tableIndex, inviteIndex) {
            Swal.fire({
                title: 'Confirmation',
                text: 'Supprimer cet invité ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    tablesData[tableIndex].invites.splice(inviteIndex, 1);
                    localStorage.setItem('tablesData', JSON.stringify(tablesData));
                    afficherTables();
                }
            });
        }

        function sauvegarderDonnees() {
            localStorage.setItem('tablesData', JSON.stringify(tablesData));
            Swal.fire('Succès', 'Données sauvegardées', 'success');
        }
    </script>
</body>
</html>
