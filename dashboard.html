<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Mariage Guelor & Naomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--black) 0%, var(--dark-gray) 100%);
        }
        
        .navbar-brand, .nav-link {
            color: white !important;
        }
        
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--gold) !important;
        }
        
        .event-header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            border: none;
            border-radius: 8px;
            transition: transform 0.3s ease;
            height: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 600;
        }
        
        .btn-gold {
            background-color: var(--gold);
            border-color: var(--gold);
            color: white;
        }
        
        .btn-gold:hover {
            background-color: var(--dark-gold);
            border-color: var(--dark-gold);
            color: white;
        }
        
        .menu-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .menu-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <script>
        (function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '1-login.html';
            }
        })();
        
        function logout() {
            Swal.fire({
                title: 'Déconnexion',
                text: 'Êtes-vous sûr ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#D4AF37',
                confirmButtonText: 'Oui'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('isLoggedIn');
                    window.location.href = '1-login.html';
                }
            });
        }
    </script>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Mariage Guelor & Naomie</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:void(0)" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="event-header">
        <div class="container">
            <h1 class="display-4 text-gold">Tableau de bord</h1>
            <p class="lead">Gérez votre mariage facilement</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card menu-card" onclick="window.location.href='3-gestion-tables.html'">
                    <div class="card-body text-center p-5">
                        <i class="fas fa-chair fa-4x text-gold mb-3"></i>
                        <h3>Gestion des tables</h3>
                        <p class="text-muted">Créer, modifier, supprimer les tables</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card menu-card" onclick="window.location.href='4-gestion-invites.html'">
                    <div class="card-body text-center p-5">
                        <i class="fas fa-users fa-4x text-gold mb-3"></i>
                        <h3>Gestion des invités</h3>
                        <p class="text-muted">Gérer les invités, envoyer les invitations</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h4>Statistiques</h4>
                        <div class="row text-center">
                            <div class="col-md-4">
                                <div class="stat-number" id="totalTables">0</div>
                                <p>Tables</p>
                            </div>
                            <div class="col-md-4">
                                <div class="stat-number" id="totalInvites">0</div>
                                <p>Invités</p>
                            </div>
                            <div class="col-md-4">
                                <div class="stat-number" id="totalConfirmes">0</div>
                                <p>Confirmés</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mettreAJourStats() {
            const tables = JSON.parse(localStorage.getItem('tables')) || [];
            const invites = JSON.parse(localStorage.getItem('invites')) || [];
            
            document.getElementById('totalTables').textContent = tables.length;
            document.getElementById('totalInvites').textContent = invites.length;
            document.getElementById('totalConfirmes').textContent = 
                invites.filter(i => i.confirmation === 'oui').length;
        }
        
        mettreAJourStats();
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</body>
</html>
