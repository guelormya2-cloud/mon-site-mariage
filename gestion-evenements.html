<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Gestion des événements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --dark-gray: #2c2c2c;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, #000 0%, #2c2c2c 100%);
            margin-bottom: 20px;
        }
        
        .navbar-brand {
            color: var(--gold) !important;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }
        
        .nav-link {
            color: white !important;
        }
        
        .btn-gold {
            background-color: var(--gold);
            border-color: var(--gold);
            color: white;
        }
        
        .btn-gold:hover {
            background-color: var(--dark-gold);
            border-color: var(--dark-gold);
            color: white;
        }
        
        .event-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 20px;
            background: white;
            overflow: hidden;
        }
        
        .event-header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: white;
            padding: 15px;
        }
        
        .event-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .photo-upload-area {
            border: 2px dashed #ced4da;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        .photo-upload-area:hover {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.05);
        }
        
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 8px;
        }
        
        .info-item {
            margin-bottom: 10px;
        }
        
        .info-item label {
            font-weight: 600;
            color: var(--dark-gray);
        }
        
        .badge-actif {
            background-color: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .badge-archive {
            background-color: #6c757d;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .badge-passe {
            background-color: #ffc107;
            color: black;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .event-image {
                height: 150px;
            }
            
            .btn {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        })();

        // Données des événements
        let evenements = JSON.parse(localStorage.getItem('evenements')) || [];
        let photoBase64 = '';
        
        function sauvegarder() {
            localStorage.setItem('evenements', JSON.stringify(evenements));
            afficherEvenements();
        }
        
        function convertirImageEnBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Gestion des événements</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-arrow-left me-1"></i>Retour
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Bouton d'ajout -->
        <div class="row mb-4">
            <div class="col-12">
                <button class="btn btn-gold" onclick="ajouterEvenement()">
                    <i class="fas fa-plus me-2"></i>Nouvel événement
                </button>
            </div>
        </div>
        
        <!-- Liste des événements -->
        <div class="row" id="evenementsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <script>
        function afficherEvenements() {
            const container = document.getElementById('evenementsContainer');
            const aujourdhui = new Date().toISOString().split('T')[0];
            
            container.innerHTML = '';
            
            if (evenements.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="text-center py-5">
                            <i class="fas fa-calendar-times fa-4x text-muted mb-3"></i>
                            <h5>Aucun événement</h5>
                            <p>Cliquez sur "Nouvel événement" pour commencer</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // Trier par date (du plus récent au plus ancien)
            evenements.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            evenements.forEach((event, index) => {
                const dateEvent = new Date(event.date);
                const aujourdhuiDate = new Date(aujourdhui);
                const estPasse = dateEvent < aujourdhuiDate;
                const estArchive = event.archive || estPasse;
                
                let badgeClass = 'badge-actif';
                let badgeTexte = 'Actif';
                
                if (estArchive) {
                    badgeClass = 'badge-archive';
                    badgeTexte = 'Archivé';
                } else if (estPasse) {
                    badgeClass = 'badge-passe';
                    badgeTexte = 'Passé';
                }
                
                container.innerHTML += `
                    <div class="col-md-6 mb-4">
                        <div class="event-card">
                            <div class="event-header">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0">${event.nom}</h5>
                                    <span class="badge ${badgeClass}">${badgeTexte}</span>
                                </div>
                            </div>
                            <img src="${event.photo || 'https://via.placeholder.com/800x400?text=Photo+non+disponible'}" 
                                 class="event-image" alt="${event.nom}" 
                                 onerror="this.src='https://via.placeholder.com/800x400?text=Photo+non+disponible'">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-6">
                                        <p><i class="fas fa-calendar me-2 text-gold"></i>${event.date}</p>
                                        <p><i class="fas fa-clock me-2 text-gold"></i>${event.heure}</p>
                                    </div>
                                    <div class="col-6">
                                        <p><i class="fas fa-map-marker me-2 text-gold"></i>${event.lieu}</p>
                                        <p><i class="fas fa-phone me-2 text-gold"></i>${event.telephone}</p>
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-3">
                                    <button class="btn btn-sm btn-outline-primary flex-fill" onclick="modifierEvenement(${index})">
                                        <i class="fas fa-edit me-1"></i>Modifier
                                    </button>
                                    <button class="btn btn-sm btn-outline-success flex-fill" onclick="dupliquerEvenement(${index})">
                                        <i class="fas fa-copy me-1"></i>Dupliquer
                                    </button>
                                    ${!estArchive ? `
                                        <button class="btn btn-sm btn-outline-warning flex-fill" onclick="archiverEvenement(${index})">
                                            <i class="fas fa-archive me-1"></i>Archiver
                                        </button>
                                    ` : `
                                        <button class="btn btn-sm btn-outline-success flex-fill" onclick="restaurerEvenement(${index})">
                                            <i class="fas fa-undo me-1"></i>Restaurer
                                        </button>
                                    `}
                                    <button class="btn btn-sm btn-outline-danger flex-fill" onclick="supprimerEvenement(${index})">
                                        <i class="fas fa-trash me-1"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        function ajouterEvenement() {
            let photoInput = '';
            
            Swal.fire({
                title: 'Nouvel événement',
                html: `
                    <input type="text" id="nom" class="swal2-input" placeholder="Nom de l'événement" value="Nouvel événement">
                    <input type="date" id="date" class="swal2-input" value="${new Date().toISOString().split('T')[0]}">
                    <input type="time" id="heure" class="swal2-input" value="19:00">
                    <input type="text" id="lieu" class="swal2-input" placeholder="Lieu">
                    <textarea id="adresse" class="swal2-textarea" placeholder="Adresse complète"></textarea>
                    <input type="tel" id="telephone" class="swal2-input" placeholder="Téléphone">
                    <input type="email" id="email" class="swal2-input" placeholder="Email">
                    <div class="photo-upload-area" onclick="document.getElementById('photoFile').click()">
                        <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                        <p>Cliquez pour choisir une photo</p>
                        <input type="file" id="photoFile" accept="image/*" style="display: none;" onchange="previewPhoto(event)">
                    </div>
                    <img id="photoPreview" class="photo-preview" style="display: none;">
                `,
                confirmButtonText: 'Créer',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Annuler',
                didOpen: () => {
                    // Ajouter l'écouteur d'événement pour le fichier
                    document.getElementById('photoFile').addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                document.getElementById('photoPreview').src = e.target.result;
                                document.getElementById('photoPreview').style.display = 'block';
                                photoBase64 = e.target.result;
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                },
                preConfirm: () => {
                    const nom = document.getElementById('nom').value.trim();
                    if (!nom) {
                        Swal.showValidationMessage('Le nom est requis');
                        return false;
                    }
                    
                    evenements.push({
                        id: Date.now(),
                        nom: nom,
                        date: document.getElementById('date').value,
                        heure: document.getElementById('heure').value,
                        lieu: document.getElementById('lieu').value,
                        adresse: document.getElementById('adresse').value,
                        telephone: document.getElementById('telephone').value,
                        email: document.getElementById('email').value,
                        photo: photoBase64 || 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80',
                        archive: false,
                        dateCreation: new Date().toISOString()
                    });
                    sauvegarder();
                }
            });
        }
        
        function modifierEvenement(index) {
            const event = evenements[index];
            photoBase64 = event.photo;
            
            Swal.fire({
                title: 'Modifier l\'événement',
                html: `
                    <input type="text" id="nom" class="swal2-input" value="${event.nom}">
                    <input type="date" id="date" class="swal2-input" value="${event.date}">
                    <input type="time" id="heure" class="swal2-input" value="${event.heure}">
                    <input type="text" id="lieu" class="swal2-input" value="${event.lieu}">
                    <textarea id="adresse" class="swal2-textarea">${event.adresse || ''}</textarea>
                    <input type="tel" id="telephone" class="swal2-input" value="${event.telephone || ''}">
                    <input type="email" id="email" class="swal2-input" value="${event.email || ''}">
                    <div class="photo-upload-area" onclick="document.getElementById('photoFile').click()">
                        <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                        <p>Cliquez pour changer la photo</p>
                        <input type="file" id="photoFile" accept="image/*" style="display: none;" onchange="previewPhoto(event)">
                    </div>
                    <img id="photoPreview" class="photo-preview" src="${event.photo}" style="display: block;">
                `,
                confirmButtonText: 'Modifier',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Annuler',
                didOpen: () => {
                    document.getElementById('photoFile').addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                document.getElementById('photoPreview').src = e.target.result;
                                photoBase64 = e.target.result;
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                },
                preConfirm: () => {
                    evenements[index] = {
                        ...event,
                        nom: document.getElementById('nom').value,
                        date: document.getElementById('date').value,
                        heure: document.getElementById('heure').value,
                        lieu: document.getElementById('lieu').value,
                        adresse: document.getElementById('adresse').value,
                        telephone: document.getElementById('telephone').value,
                        email: document.getElementById('email').value,
                        photo: photoBase64 || event.photo
                    };
                    sauvegarder();
                }
            });
        }
        
        function previewPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                    photoBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        
        function dupliquerEvenement(index) {
            const event = evenements[index];
            const nouveauEvent = {
                ...event,
                id: Date.now(),
                nom: event.nom + ' (copie)',
                archive: false,
                dateCreation: new Date().toISOString()
            };
            evenements.push(nouveauEvent);
            sauvegarder();
            Swal.fire('Succès', 'Événement dupliqué', 'success');
        }
        
        function archiverEvenement(index) {
            Swal.fire({
                title: 'Archiver',
                text: `Archiver l'événement ${evenements[index].nom} ?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ffc107',
                confirmButtonText: 'Oui, archiver'
            }).then((result) => {
                if (result.isConfirmed) {
                    evenements[index].archive = true;
                    sauvegarder();
                    Swal.fire('Archivé!', 'Événement archivé', 'success');
                }
            });
        }
        
        function restaurerEvenement(index) {
            Swal.fire({
                title: 'Restaurer',
                text: `Restaurer l'événement ${evenements[index].nom} ?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                confirmButtonText: 'Oui, restaurer'
            }).then((result) => {
                if (result.isConfirmed) {
                    evenements[index].archive = false;
                    sauvegarder();
                    Swal.fire('Restauré!', 'Événement restauré', 'success');
                }
            });
        }
        
        function supprimerEvenement(index) {
            Swal.fire({
                title: 'Confirmation',
                text: `Supprimer définitivement ${evenements[index].nom} ?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Oui, supprimer'
            }).then((result) => {
                if (result.isConfirmed) {
                    evenements.splice(index, 1);
                    sauvegarder();
                    Swal.fire('Supprimé!', 'Événement supprimé', 'success');
                }
            });
        }
        
        afficherEvenements();
    </script>
</body>
</html>
